meta:
  experiment_name: "highwayv0_ppolag_trans_c1_continue_to300k"
  seed: 1
  device: "auto"

env:
  name: "highway-v0"
  package_version: "highway-env==1.10.2"
  config:
    observation:
      type: "Kinematics"
    action:
      type: "ContinuousAction"
  max_episode_steps: 200

safety:
  cost_type: "episode_collision_indicator"
  use_step_cost_logging: true
  cost_threshold: 0.10

algo:
  name: "ppo_lagrangian"
  total_timesteps: 250000
  rollout_steps: 2048
  parallel_envs: 4
  update_epochs: 10
  minibatches: 32
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 0.0003
  clip_ratio: 0.2
  value_coef: 0.5
  entropy_coef: 0.00
  max_grad_norm: 0.5

lagrangian:
  enabled: true
  init_lambda: 0.01
  lambda_lr: 0.01
  lambda_max: 100.0

model:
  policy_family: "transformer"
  hidden_dim: 256
  activation: "tanh"

history:
  enabled: true
  history_len: 32

chunking:
  enabled: false
  chunk_size: 1
  execute_mode: "stepwise"
  partial_replanning: false
  replanning_interval: null

transformer:
  enabled: true
  d_model: 256
  n_heads: 4
  n_layers: 4
  dropout: 0.1
  use_positional_encoding: true

pretraining:
  enabled: false
  dataset_path: null
  batch_size: 256
  epochs: 0
  learning_rate: 0.0001
  freeze_backbone: false

training:
  resume_from: "checkpoints/highwayv0_ppolag_trans_c1_online_final.zip"

evaluation:
  eval_interval: 5000
  eval_episodes: 5
  save_videos: false

logging:
  save_dir: "logs"
  checkpoint_dir: "checkpoints"
  tensorboard: true
  progress_bar: true
  csv: true
  save_used_config: true
  save_final_model: true
